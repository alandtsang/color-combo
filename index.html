<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服装颜色搭配 | Color Combo</title>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #fafaf9;
      --bg-secondary: #ffffff;
      --text-primary: #1c1917;
      --text-secondary: #78716c;
      --border-color: #e7e5e4;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* Left Panel - Color Picker */
    .picker-panel {
      width: 380px;
      min-width: 380px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      padding: 48px 32px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .picker-panel h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .picker-panel .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    /* Main Color Display */
    .main-color-display {
      position: relative;
    }

    .color-preview-large {
      width: 100%;
      height: 200px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      transition: background-color 0.2s ease;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 20px;
    }

    .color-preview-large .hex-display {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'SF Mono', Monaco, monospace;
      box-shadow: var(--shadow-sm);
    }

    /* Color Picker Section */
    .picker-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .picker-section label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Color Wheel */
    .color-wheel-container {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto;
    }

    .color-wheel {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      cursor: crosshair;
      position: relative;
      box-shadow: var(--shadow-md), inset 0 0 0 1px rgba(0,0,0,0.05);
    }

    .color-wheel::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: white;
      border-radius: 50%;
      box-shadow: var(--shadow-sm), inset 0 0 0 1px rgba(0,0,0,0.05);
      pointer-events: none;
    }

    .wheel-selector {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 3px solid white;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transform: translate(-50%, -50%);
      pointer-events: none;
      top: 100px;
      left: 100px;
    }

    /* Saturation Slider */
    .slider-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(to right, #f5f5f5, currentColor);
      outline: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: white;
      box-shadow: var(--shadow-md), 0 0 0 1px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }

    /* HEX Input */
    .hex-input-container {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .hex-input-container:focus-within {
      border-color: #a8a29e;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
    }

    .hex-input-container .hash {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .hex-input-container input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 18px;
      font-family: 'SF Mono', Monaco, monospace;
      font-weight: 500;
      outline: none;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Quick Colors */
    .quick-colors {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick-color {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    .quick-color:hover {
      transform: scale(1.15);
    }

    .quick-color.active {
      border-color: var(--text-primary);
    }


    /* Avatar Panel (Middle) */
    .avatar-panel {
      width: 420px;
      min-width: 420px;
      background: var(--bg-primary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .avatar-header {
      padding: 48px 32px 24px;
    }

    .avatar-header h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .avatar-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .avatar-preview-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 0 20px;
    }

    .avatar-svg {
      max-height: 100%;
      width: 100%;
    }

    .avatar-canvas {
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .avatar-controls {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .control-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .control-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-option {
      padding: 8px 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-option:hover {
      border-color: var(--text-primary);
      color: var(--text-primary);
    }

    .btn-option.active {
      background: var(--text-primary);
      border-color: var(--text-primary);
      color: white;
    }

    /* Right Panel - Color Schemes */
    .schemes-panel {
      flex: 1;
      padding: 48px 40px;
      overflow-y: auto;
    }

    .schemes-header {
      margin-bottom: 32px;
    }

    .schemes-header h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .schemes-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .schemes-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Scheme Card */
    .scheme-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-md);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .scheme-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .scheme-type {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-primary);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
    }

    .scheme-type-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--text-primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .copy-btn:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    .copy-btn.copied {
      background: #22c55e;
    }

    /* Color Bar */
    .color-bar {
      display: flex;
      height: 80px;
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .color-segment {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: flex 0.3s ease;
    }

    .color-segment.main { flex: 60; }
    .color-segment.secondary { flex: 30; }
    .color-segment.accent { flex: 10; }

    /* Color Info */
    .color-info {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .color-info-item {
      text-align: center;
      padding: 12px;
      background: var(--bg-primary);
      border-radius: var(--radius-sm);
    }

    .color-info-item .label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .color-info-item .hex {
      font-size: 14px;
      font-weight: 600;
      font-family: 'SF Mono', Monaco, monospace;
    }

    .color-info-item .percent {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      margin: 0 auto 8px;
      box-shadow: var(--shadow-sm), inset 0 0 0 1px rgba(0,0,0,0.1);
    }

    /* Mode Selector */
    .mode-selector {
      display: flex;
      background: var(--bg-primary);
      border-radius: var(--radius-md);
      padding: 4px;
      gap: 4px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .mode-btn:hover {
      color: var(--text-primary);
    }

    .mode-btn.active {
      background: var(--bg-secondary);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    /* Step Indicator */
    .step-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-color);
      transition: background 0.2s ease;
    }

    .step-dot.active {
      background: var(--text-primary);
    }

    .step-dot.completed {
      background: #22c55e;
    }

    /* Step Panel */
    .step-panel {
      display: none;
      flex-direction: column;
      gap: 24px;
    }

    .step-panel.active {
      display: flex;
    }

    .step-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .step-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .step-section-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .step-section-value {
      font-size: 12px;
      font-family: 'SF Mono', Monaco, monospace;
      color: var(--text-secondary);
    }

    /* Secondary/Accent Suggestions */
    .hue-suggestions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .hue-suggestion {
      position: relative;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    .hue-suggestion:hover {
      transform: scale(1.1);
    }

    .hue-suggestion.selected {
      border-color: var(--text-primary);
    }

    .hue-suggestion-label {
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--text-secondary);
      white-space: nowrap;
      background: rgba(255,255,255,0.9);
      padding: 2px 4px;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .hue-suggestion:hover .hue-suggestion-label,
    .hue-suggestion.selected .hue-suggestion-label {
      opacity: 1;
    }

    /* Lightness Slider for suggestion */
    .suggestion-lightness {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .suggestion-lightness input[type="range"] {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #1c1917, #a8a29e);
      outline: none;
    }

    .suggestion-lightness input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      box-shadow: var(--shadow-sm), 0 0 0 1px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .suggestion-lightness span {
      font-size: 11px;
      color: var(--text-secondary);
      min-width: 32px;
      text-align: right;
    }

    /* Color Preview Bar */
    .color-preview-bar {
      display: flex;
      height: 60px;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }

    .preview-segment {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: flex 0.3s ease;
    }

    .preview-segment.main { flex: 60; }
    .preview-segment.secondary { flex: 30; }
    .preview-segment.accent { flex: 10; }

    /* Selected Colors Display */
    .selected-colors-display {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .selected-color-item {
      text-align: center;
      padding: 12px 8px;
      background: var(--bg-primary);
      border-radius: var(--radius-sm);
    }

    .selected-color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      margin: 0 auto 8px;
      box-shadow: var(--shadow-sm), inset 0 0 0 1px rgba(0,0,0,0.1);
    }

    .selected-color-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .selected-color-hex {
      font-size: 12px;
      font-weight: 600;
      font-family: 'SF Mono', Monaco, monospace;
    }

    /* Copy Button */
    .copy-combo-btn {
      width: 100%;
      padding: 14px;
      background: var(--text-primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .copy-combo-btn:hover {
      opacity: 0.9;
      transform: scale(1.01);
    }

    .copy-combo-btn.copied {
      background: #22c55e;
    }

    /* Disabled state */
    .step-section.disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    /* Responsive */

    @media (max-width: 1200px) {
      .avatar-panel {
        width: 360px;
        min-width: 360px;
      }
    }

    @media (max-width: 900px) {
      .app {
        flex-direction: column;
      }

      .picker-panel {
        width: 100%;
      .avatar-panel {
        width: 100%;
        min-width: unset;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
      }
      .avatar-preview-container {
        height: 400px;
        padding: 20px;
      }

        min-width: unset;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
        padding: 32px 24px;
        gap: 24px;
      }

      .color-wheel-container {
        width: 160px;
        height: 160px;
      }

      .color-wheel {
        width: 160px;
        height: 160px;
      }

      .color-wheel::after {
        width: 50px;
        height: 50px;
      }

      .wheel-selector {
        top: 80px;
        left: 80px;
      }

      .schemes-panel {
        padding: 32px 24px;
      }

      .color-info {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .color-info-item {
        display: flex;
        align-items: center;
        gap: 12px;
        text-align: left;
      }

      .color-swatch {
        margin: 0;
      }
    }

    @media (max-width: 480px) {
      .picker-panel {
        padding: 24px 16px;
      }

      .avatar-header, .avatar-controls {
        padding: 24px 16px;
      }


      .schemes-panel {
        padding: 24px 16px;
      }

      .scheme-card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Left Panel: Color Picker -->
    <aside class="picker-panel">
      <header>
        <h1>服装颜色搭配</h1>
        <p class="subtitle">基于 60-30-10 色彩法则</p>
      </header>

      <!-- Mode Selector -->
      <div class="mode-selector">
        <button class="mode-btn active" data-mode="auto">自动生成</button>
        <button class="mode-btn" data-mode="step">逐步选择</button>
      </div>

      <!-- Auto Mode: Main Color Display -->
      <div class="main-color-display" id="mainColorSection">
        <div class="color-preview-large" id="mainColorPreview">
          <span class="hex-display" id="mainHexDisplay">#6366F1</span>
        </div>
      </div>

      <!-- Color Wheel -->
      <div class="picker-section">
        <label>色轮选择</label>
        <div class="color-wheel-container">
          <canvas id="colorWheel" class="color-wheel" width="200" height="200"></canvas>
          <div class="wheel-selector" id="wheelSelector"></div>
        </div>
      </div>

      <!-- Saturation Slider -->
      <div class="picker-section">
        <div class="slider-container">
          <div class="slider-labels">
            <span>饱和度</span>
            <span id="saturationValue">100%</span>
          </div>
          <input
            type="range"
            class="slider"
            id="saturationSlider"
            min="0"
            max="100"
            value="70"
            style="color: hsl(239, 84%, 70%);"
          >
        </div>
      </div>

      <!-- Lightness Slider -->
      <div class="picker-section">
        <div class="slider-container">
          <div class="slider-labels">
            <span>明度</span>
            <span id="lightnessValue">65%</span>
          </div>
          <input
            type="range"
            class="slider"
            id="lightnessSlider"
            min="0"
            max="100"
            value="65"
            style="color: hsl(239, 70%, 65%);"
          >
        </div>
      </div>

      <!-- HEX Input -->
      <div class="picker-section">
        <label>HEX 输入</label>
        <div class="hex-input-container">
          <span class="hash">#</span>
          <input type="text" id="hexInput" maxlength="6" value="6366F1" placeholder="6366F1">
        </div>
      </div>

      <!-- Quick Colors -->
      <div class="picker-section">
        <label>快速选择</label>
        <div class="quick-colors" id="quickColors"></div>
      </div>

      <!-- Step-by-Step Mode Panel -->
      <div class="step-panel" id="stepPanel">
        <!-- Step Indicator -->
        <div class="step-indicator">
          <span class="step-dot active" id="step1Dot"></span>
          <span>选择辅色</span>
          <span class="step-dot" id="step2Dot"></span>
          <span>选择点缀色</span>
          <span class="step-dot" id="step3Dot"></span>
        </div>

        <!-- Secondary Color Suggestions -->
        <div class="step-section" id="secondarySection">
          <div class="step-section-header">
            <span class="step-section-title">选择辅色</span>
            <span class="step-section-value" id="secondaryValue">—</span>
          </div>
          <div class="hue-suggestions" id="secondarySuggestions"></div>
          <div class="suggestion-lightness" id="secondaryLightnessControl" style="display: none;">
            <input type="range" id="secondaryLightnessSlider" min="20" max="80" value="50">

  <script>
    // State

    // Quick color presets

      '#EF4444', '#F97316', '#EAB308', '#22C55E',

    // Initialize quick colors
    quickColors.forEach(color => {

        btn.classList.add('active');

      quickColorsContainer.appendChild(btn);
    });

    // Draw color wheel
    function drawColorWheel() {
      const ctx = colorWheel.getContext('2d');
      const centerX = 100;
      const centerY = 100;
      const radius = 95;

      // Clear canvas
      ctx.clearRect(0, 0, 200, 200);

      // Draw color wheel pixel by pixel for correct saturation gradient
      const imageData = ctx.createImageData(200, 200);
      const data = imageData.data;

      for (let py = 0; py < 200; py++) {
        for (let px = 0; px < 200; px++) {
          const x = px - centerX;
          const y = py - centerY;
          const distance = Math.sqrt(x * x + y * y);

          if (distance <= radius) {
            // Selector angle: 0°=top, 90°=right, 180°=bottom, 270°=left
            // atan2(-y, x): 0°=right, 90°=top, 180°=left, 270°=bottom
            // SelectorAngle = (atan2(-y,x) - 90 + 360) % 360
            let rawAngle = Math.atan2(-y, x) * 180 / Math.PI;
            if (rawAngle < 0) rawAngle += 360;
            const angle = (rawAngle - 90 + 360) % 360;

            // Saturation based on distance from center (0 at center, 100 at edge)
            const saturation = (distance / radius) * 100;
            const lightness = 65;

            const rgb = hslToRgb(angle, saturation, lightness);
            const idx = (py * 200 + px) * 4;
            data[idx] = rgb.r;
            data[idx + 1] = rgb.g;
            data[idx + 2] = rgb.b;
            data[idx + 3] = 255;
          }
        }
      }

      ctx.putImageData(imageData, 0, 0);
    }

    // Update wheel selector position
    function updateWheelSelector() {
      const angleRad = currentHue * Math.PI / 180;
      const radius = 95 * (currentSaturation / 100);
      // Selector angle: 0°=top, 90°=right, 180°=bottom, 270°=left
      // atan2(-y, x) coordinate: 0°=right, 90°=top, 180°=left, 270°=bottom
      // Position formula: x = r*cos(θ), y = r*sin(θ) relative to center
      const x = 100 + radius * Math.cos(angleRad);
      const y = 100 + radius * Math.sin(angleRad);
      wheelSelector.style.left = `${x}px`;
      wheelSelector.style.top = `${y}px`;
      wheelSelector.style.backgroundColor = `hsl(${currentHue}, ${currentSaturation}%, 65%)`;
    }

    // Handle color wheel click
    function handleWheelClick(e) {
      const rect = colorWheel.getBoundingClientRect();
      const x = e.clientX - rect.left - 100;
      const y = e.clientY - rect.top - 100;

      // atan2(-y, x) gives: 0° at right, 90° at top, 180° at left, 270° at bottom
      // Selector angle: 0° at top, 90° at right, 180° at bottom, 270° at left
      // So selectorAngle = (drawingAngle - 90 + 360) % 360
      let drawingAngle = Math.atan2(-y, x) * 180 / Math.PI;
      if (drawingAngle < 0) drawingAngle += 360;
      const angle = (drawingAngle - 90 + 360) % 360;

      // Saturation based on distance from center (0=center, 95=edge)
      const distance = Math.sqrt(x * x + y * y);
      const saturation = Math.min(100, Math.max(0, (distance / 95) * 100));

      currentHue = Math.round(angle);
      currentSaturation = Math.round(saturation);

      saturationSlider.value = currentSaturation;
      updateFromHSL();
    }

    // Update from HSL values
    function updateFromHSL() {
      saturationValue.textContent = `${currentSaturation}%`;
      saturationSlider.style.color = `hsl(${currentHue}, ${currentSaturation}%, 65%)`;
      lightnessValue.textContent = `${currentLightness}%`;
      lightnessSlider.style.color = `hsl(${currentHue}, ${currentSaturation}%, ${currentLightness}%)`;

      const hex = hslToHex(currentHue, currentSaturation, currentLightness);
      mainColorPreview.style.backgroundColor = hex;
      mainHexDisplay.textContent = hex;
      hexInput.value = hex.slice(1).toUpperCase();

      updateWheelSelector();
      generateSchemes();

      // Update step panel if in step mode
      if (currentMode === 'step') {
        selectedSecondary = null;
        selectedAccent = null;
        secondaryValue.textContent = '—';
        accentValue.textContent = '—';
        secondaryLightnessControl.style.display = 'none';
        accentLightnessControl.style.display = 'none';
        accentSection.classList.add('disabled');
        copyComboBtn.style.display = 'none';
        step1Dot.className = 'step-dot active';
        step2Dot.className = 'step-dot';
        step3Dot.className = 'step-dot';
        renderSecondarySuggestions();
        updateStepPreview();
      }
    }

    // Set color from HEX
    function setColorFromHex(hex) {
      hex = hex.replace('#', '');
      const rgb = hexToRgb(hex);
      const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);

      currentHue = hsl.h;
      currentSaturation = hsl.s;
      currentLightness = hsl.l;

      saturationSlider.value = currentSaturation;
      lightnessSlider.value = currentLightness;
      updateFromHSL();
    }

    // Color conversion utilities
    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : null;
    }

    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(x => {
        const hex = Math.round(x).toString(16);
        return hex.length === 1 ? '0' + hex : hex;
      }).join('').toUpperCase();
    }

    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;

      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }
      return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
    }

    function hslToRgb(h, s, l) {
      s /= 100;
      l /= 100;
      const k = n => (n + h / 30) % 12;
      const a = s * Math.min(l, 1 - l);
      const hue = n => l - a * Math.max(Math.min(k(n) - 3, 9 - k(n), 1), -1);
      return {
        r: Math.round(hue(0) * 255),
        g: Math.round(hue(8) * 255),
        b: Math.round(hue(4) * 255)
      };
    }

    function hslToHex(h, s, l) {
      const { r, g, b } = hslToRgb(h, s, l);
      return rgbToHex(r, g, b);
    }


    // Avatar Logic - Babylon.js 3D
    const avatarState = {
      upper: 'tshirt',
      lower: 'skirt',
      hat: false,
      necklace: true,
      watch: false
    };

    // Babylon.js globals
    let engine;
    let scene;
    let camera;
    let avatarRoot;
    let upperMeshes = [];
    let lowerMeshes = [];
    let accMeshes = [];
    let skinMaterial;
    let hairMaterial;
    let faceMaterial;
    let upperMaterial;
    let lowerMaterial;
    let accMaterial;
    let shadowGenerator;

    function hexToColor3(hex) {
      hex = hex.replace('#', '');
      const r = parseInt(hex.substr(0, 2), 16) / 255;
      const g = parseInt(hex.substr(2, 2), 16) / 255;
      const b = parseInt(hex.substr(4, 2), 16) / 255;
      return new BABYLON.Color3(r, g, b);
    }

    function initBabylonScene() {
      const canvas = document.getElementById('avatar-canvas');
      const container = canvas.parentElement;

      engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });
      scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0.98, 0.98, 0.98, 1);

      // Camera - ArcRotateCamera for 360° rotation + zoom
      camera = new BABYLON.ArcRotateCamera('camera', -Math.PI / 2, Math.PI / 2.5, 400, new BABYLON.Vector3(0, 100, 0), scene);
      camera.attachControl(canvas, true);
      camera.lowerRadiusLimit = 250;
      camera.upperRadiusLimit = 700;
      camera.wheelPrecision = 50;
      camera.panningSensibility = 0;
      camera.minZ = 0.1;

      // Lighting - Realistic PBR-style
      const hemiLight = new BABYLON.HemisphericLight('hemiLight', new BABYLON.Vector3(0, 1, 0), scene);
      hemiLight.intensity = 0.6;
      hemiLight.diffuse = new BABYLON.Color3(1, 0.98, 0.95);
      hemiLight.groundColor = new BABYLON.Color3(0.4, 0.4, 0.45);

      const dirLight = new BABYLON.DirectionalLight('dirLight', new BABYLON.Vector3(-1, -2, -1), scene);
      dirLight.intensity = 0.8;
      dirLight.diffuse = new BABYLON.Color3(1, 0.95, 0.9);

      const fillLight = new BABYLON.DirectionalLight('fillLight', new BABYLON.Vector3(1, -1, 1), scene);
      fillLight.intensity = 0.3;
      fillLight.diffuse = new BABYLON.Color3(0.9, 0.95, 1);

      // Shadow generator
      shadowGenerator = new BABYLON.ShadowGenerator(1024, dirLight);
      shadowGenerator.useBlurExponentialShadowMap = true;
      shadowGenerator.blurKernel = 32;

      // Create shadow plane
      const shadowPlane = BABYLON.MeshBuilder.CreateGround('shadowPlane', { width: 300, height: 300 }, scene);
      shadowPlane.position.y = -180;
      shadowPlane.receiveShadows = true;
      const shadowMat = new BABYLON.StandardMaterial('shadowMat', scene);
      shadowMat.diffuseColor = new BABYLON.Color3(0, 0, 0);
      shadowMat.alpha = 0.15;
      shadowPlane.material = shadowMat;

      // Materials
      skinMaterial = new BABYLON.PBRMaterial('skinMat', scene);
      skinMaterial.albedoColor = hexToColor3('#fcdbb5');
      skinMaterial.metallic = 0.0;
      skinMaterial.roughness = 0.7;

      hairMaterial = new BABYLON.PBRMaterial('hairMat', scene);
      hairMaterial.albedoColor = hexToColor3('#2d2d2d');
      hairMaterial.metallic = 0.1;
      hairMaterial.roughness = 0.8;

      faceMaterial = new BABYLON.PBRMaterial('faceMat', scene);
      faceMaterial.albedoColor = hexToColor3('#fcdbb5');
      faceMaterial.metallic = 0.0;
      faceMaterial.roughness = 0.6;

      upperMaterial = new BABYLON.PBRMaterial('upperMat', scene);
      upperMaterial.albedoColor = hexToColor3('#6366f1');
      upperMaterial.metallic = 0.0;
      upperMaterial.roughness = 0.8;

      lowerMaterial = new BABYLON.PBRMaterial('lowerMat', scene);
      lowerMaterial.albedoColor = hexToColor3('#e7e5e4');
      lowerMaterial.metallic = 0.0;
      lowerMaterial.roughness = 0.8;

      accMaterial = new BABYLON.PBRMaterial('accMat', scene);
      accMaterial.albedoColor = hexToColor3('#e7e5e4');
      accMaterial.metallic = 0.3;
      accMaterial.roughness = 0.5;

      // Build character
      avatarRoot = new BABYLON.TransformNode('avatarRoot', scene);

      buildBody();
      buildClothing();
      buildAccessories();

      // Initial state
      updateClothingVisibility();
      updateAvatarColors('#6366f1', '#e7e5e4', '#e7e5e4');

      // Render loop
      engine.runRenderLoop(() => {
        scene.render();
      });

      // Resize handler
      const resizeObserver = new ResizeObserver(() => {
        engine.resize();
      });
      resizeObserver.observe(container);
    }

    function buildBody() {
      // Torso
      const torso = BABYLON.MeshBuilder.CreateCylinder('torso', {
        height: 120,
        diameterTop: 50,
        diameterBottom: 60,
        tessellation: 16

      torso.position.y = 100;
      torso.material = skinMaterial;
      torso.parent = avatarRoot;
      shadowGenerator.addShadowCaster(torso);

      // Neck
      const neck = BABYLON.MeshBuilder.CreateCylinder('neck', {
        height: 30,
        diameter: 20,
        tessellation: 12

      neck.material = skinMaterial;
      neck.parent = avatarRoot;

      // Head

      head.position.y = 200;

      head.material = faceMaterial;
      head.parent = avatarRoot;
      shadowGenerator.addShadowCaster(head);

      // Eyes
      const eyeL = BABYLON.MeshBuilder.CreateSphere('eyeL', { diameter: 6 }, scene);
      eyeL.position = new BABYLON.Vector3(-12, 205, 28);
      eyeL.material = new BABYLON.StandardMaterial('eyeLMat', scene);
      eyeL.material.diffuseColor = new BABYLON.Color3(0.15, 0.15, 0.15);
      eyeL.parent = avatarRoot;

      const eyeR = BABYLON.MeshBuilder.CreateSphere('eyeR', { diameter: 6 }, scene);
      eyeR.position = new BABYLON.Vector3(12, 205, 28);
      eyeR.material = eyeL.material;
      eyeR.parent = avatarRoot;

      // Blush
      const blushMat = new BABYLON.StandardMaterial('blushMat', scene);
      blushMat.diffuseColor = new BABYLON.Color3(1, 0.7, 0.75);
      blushMat.alpha = 0.5;

      const blushL = BABYLON.MeshBuilder.CreateSphere('blushL', { diameter: 10 }, scene);
      blushL.position = new BABYLON.Vector3(-22, 198, 22);
      blushL.scaling = new BABYLON.Vector3(1, 0.6, 0.3);
      blushL.material = blushMat;
      blushL.parent = avatarRoot;

      const blushR = BABYLON.MeshBuilder.CreateSphere('blushR', { diameter: 10 }, scene);
      blushR.position = new BABYLON.Vector3(22, 198, 22);
      blushR.scaling = new BABYLON.Vector3(1, 0.6, 0.3);
      blushR.material = blushMat;
      blushR.parent = avatarRoot;

      // Mouth
      const mouth = BABYLON.MeshBuilder.CreateTorus('mouth', {
        diameter: 12,
        thickness: 2,
        tessellation: 16
      }, scene);
      mouth.position = new BABYLON.Vector3(0, 188, 28);
      mouth.rotation.z = Math.PI;
      const mouthMat = new BABYLON.StandardMaterial('mouthMat', scene);
      mouthMat.diffuseColor = new BABYLON.Color3(0.83, 0.6, 0.53);
      mouth.material = mouthMat;
      mouth.parent = avatarRoot;

      // Hair (back)
      const hairBack = BABYLON.MeshBuilder.CreateSphere('hairBack', {
        diameter: 75,
        segments: 12
      }, scene);
      hairBack.position.y = 210;
      hairBack.position.z = -5;
      hairBack.scaling = new BABYLON.Vector3(1.1, 1.2, 1);
      hairBack.material = hairMaterial;
      hairBack.parent = avatarRoot;
      shadowGenerator.addShadowCaster(hairBack);

      // Hair (bangs)
      const bangs = BABYLON.MeshBuilder.CreateSphere('bangs', {
        diameter: 70,
        segments: 12
      }, scene);
      bangs.position.y = 230;
      bangs.position.z = 15;
      bangs.scaling = new BABYLON.Vector3(1.1, 0.5, 0.6);
      bangs.material = hairMaterial;
      bangs.parent = avatarRoot;

      // Legs
      const legL = BABYLON.MeshBuilder.CreateCylinder('legL', {
        height: 180,
        diameter: 28,
        tessellation: 12
      }, scene);
      legL.position = new BABYLON.Vector3(-15, -70, 0);
      legL.material = skinMaterial;
      legL.parent = avatarRoot;
      shadowGenerator.addShadowCaster(legL);

      const legR = BABYLON.MeshBuilder.CreateCylinder('legR', {
        height: 180,
        diameter: 28,
        tessellation: 12
      }, scene);
      legR.position = new BABYLON.Vector3(15, -70, 0);
      legR.material = skinMaterial;
      legR.parent = avatarRoot;
      shadowGenerator.addShadowCaster(legR);

      // Feet
      const footL = BABYLON.MeshBuilder.CreateBox('footL', {
        width: 30,
        height: 15,
        depth: 50
      }, scene);
      footL.position = new BABYLON.Vector3(-15, -165, 8);
      footL.material = skinMaterial;
      footL.parent = avatarRoot;

      const footR = BABYLON.MeshBuilder.CreateBox('footR', {
        width: 30,
        height: 15,
        depth: 50
      }, scene);
      footR.position = new BABYLON.Vector3(15, -165, 8);
      footR.material = skinMaterial;

    function updateClothingVisibility() {
      // Upper clothing
      const tshirtMeshes = ['tshirtBody', 'tshirtSleeveL', 'tshirtSleeveR'];
      const sweaterMeshes = ['sweaterBody', 'sweaterSleeveL', 'sweaterSleeveR', 'sweaterCollar'];

      upperMeshes.forEach(item => {
        if (tshirtMeshes.includes(item.name)) {
          item.mesh.setEnabled(avatarState.upper === 'tshirt');
        } else if (sweaterMeshes.includes(item.name)) {
          item.mesh.setEnabled(avatarState.upper === 'sweater');
        }
      });

      // Lower clothing
      const skirtMeshes = ['skirt'];
      const pantsMeshes = ['pants'];

      lowerMeshes.forEach(item => {
        if (skirtMeshes.includes(item.name)) {
          item.mesh.setEnabled(avatarState.lower === 'skirt');
        } else if (pantsMeshes.includes(item.name)) {
          item.mesh.setEnabled(avatarState.lower === 'pants');
        }
      });

      // Accessories
      const necklaceMeshes = ['necklace', 'necklacePendant'];
      const watchMeshes = ['watchBand', 'watchFace'];
      const hatMeshes = ['hatBrim', 'hatTop', 'hatBand'];

      accMeshes.forEach(item => {
        if (necklaceMeshes.includes(item.name)) {
          item.mesh.setEnabled(avatarState.necklace);
        } else if (watchMeshes.includes(item.name)) {
          item.mesh.setEnabled(avatarState.watch);
        } else if (hatMeshes.includes(item.name)) {
          item.mesh.setEnabled(avatarState.hat);
        }
      });
    }

    function updateAvatarColors(mainHex, secondaryHex, accentHex) {
      upperMaterial.albedoColor = hexToColor3(mainHex);
      lowerMaterial.albedoColor = hexToColor3(secondaryHex);
      accMaterial.albedoColor = hexToColor3(accentHex);

      // Add slight emissive for accent to make it pop
      const accColor = hexToColor3(accentHex);
      accMaterial.emissiveColor = new BABYLON.Color3(
        accColor.r * 0.15,
        accColor.g * 0.15,
        accColor.b * 0.15
      );
    }

    function initAvatarControls() {
      // Upper
      document.querySelectorAll('#upperControls .btn-option').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('#upperControls .btn-option').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          avatarState.upper = btn.dataset.value;
          updateClothingVisibility();
        });
      });
      // Lower
      document.querySelectorAll('#lowerControls .btn-option').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('#lowerControls .btn-option').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          avatarState.lower = btn.dataset.value;
          updateClothingVisibility();
        });
      });
      // Accessories
      document.querySelectorAll('#accessoryControls .btn-option').forEach(btn => {
        btn.addEventListener('click', (e) => {
          btn.classList.toggle('active');
          const acc = btn.dataset.value;
          avatarState[acc] = btn.classList.contains('active');
          updateClothingVisibility();
        });
      });
    }

    function applySchemeToAvatar(mainHex, secondaryHex, accentHex, e) {
      updateAvatarColors(mainHex, secondaryHex, accentHex);
      
      // Highlight the selected scheme card
      document.querySelectorAll('.scheme-card').forEach(card => {
        card.style.borderColor = 'transparent';
        card.style.boxShadow = 'var(--shadow-md)';
      });
      const activeEvent = e;
      if (activeEvent && activeEvent.currentTarget && activeEvent.currentTarget.classList.contains('scheme-card')) {
        activeEvent.currentTarget.style.borderColor = 'var(--text-primary)';
        activeEvent.currentTarget.style.boxShadow = '0 0 0 2px var(--text-primary)';
      }
    }

    // Generate color schemes
    function generateSchemes() {
      const mainColor = { h: currentHue, s: currentSaturation, l: currentLightness };

      const schemes = [
        {
          type: '互补色',
          typeEn: 'Complementary',
          colors: generateComplementary(mainColor)
        },
        {
          type: '类似色',
          typeEn: 'Analogous',
          colors: generateAnalogous(mainColor)
        },
        {
          type: '三等分',
          typeEn: 'Triadic',
          colors: generateTriadic(mainColor)
        },
        {
          type: '拆分互补',
          typeEn: 'Split-Complementary',
          colors: generateSplitComplementary(mainColor)
        },
        {
          type: '双类似',
          typeEn: 'Double Analogous',
          colors: generateDoubleAnalogous(mainColor)
        }
      ];

      renderSchemes(schemes);
      
      if (currentMode === 'auto') {
        const first = schemes[0].colors;
        updateAvatarColors(
          hslToHex(first.main.h, first.main.s, first.main.l),
          hslToHex(first.secondary.h, first.secondary.s, first.secondary.l),
          hslToHex(first.accent.h, first.accent.s, first.accent.l)
        );
      }
    }

    function generateComplementary(main) {
      const secondaryHue = (main.h + 180) % 360;
      return {
        main: main,
        secondary: { h: secondaryHue, s: Math.max(20, main.s - 15), l: Math.max(30, main.l - 15) },
        accent: { h: secondaryHue, s: Math.min(100, main.s + 20), l: Math.min(70, main.l + 10) }
      };
    }

    function generateAnalogous(main) {
      return {
        main: main,
        secondary: { h: (main.h + 30) % 360, s: main.s, l: main.l },
        accent: { h: (main.h - 30 + 360) % 360, s: main.s, l: main.l }
      };
    }

    function generateTriadic(main) {
      return {
        main: main,
        secondary: { h: (main.h + 120) % 360, s: main.s, l: main.l },
        accent: { h: (main.h + 240) % 360, s: Math.min(100, main.s + 20), l: Math.min(70, main.l + 10) }
      };
    }

    function generateSplitComplementary(main) {
      return {
        main: main,
        secondary: { h: (main.h + 150) % 360, s: main.s, l: main.l },
        accent: { h: (main.h + 210) % 360, s: Math.min(100, main.s + 20), l: Math.min(70, main.l + 10) }
      };
    }

    function generateDoubleAnalogous(main) {
      return {
        main: main,
        secondary: { h: (main.h + 60) % 360, s: main.s, l: main.l },
        accent: { h: (main.h - 60 + 360) % 360, s: Math.min(100, main.s + 20), l: Math.min(70, main.l + 10) }
      };
    }

    // Render schemes
    function renderSchemes(schemes) {
      schemesList.innerHTML = schemes.map((scheme, index) => {
        const mainHex = hslToHex(scheme.colors.main.h, scheme.colors.main.s, scheme.colors.main.l);
        const secondaryHex = hslToHex(scheme.colors.secondary.h, scheme.colors.secondary.s, scheme.colors.secondary.l);
        const accentHex = hslToHex(scheme.colors.accent.h, scheme.colors.accent.s, scheme.colors.accent.l);

        return `
          <article class="scheme-card" data-index="${index}" style="cursor:pointer;" onclick="applySchemeToAvatar(\'${mainHex}\', \'${secondaryHex}\', \'${accentHex}\', event)">
            <div class="card-header">
              <span class="scheme-type">
                <span class="scheme-type-dot" style="background: ${mainHex}"></span>
                ${scheme.type} <span style="color: var(--text-secondary)">${scheme.typeEn}</span>
              </span>
              <button class="copy-btn" onclick="event.stopPropagation(); copyScheme(this, '${mainHex}', '${secondaryHex}', '${accentHex}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                复制
              </button>
            </div>
            <div class="color-bar">
              <div class="color-segment main" style="background: ${mainHex}"></div>
              <div class="color-segment secondary" style="background: ${secondaryHex}"></div>
              <div class="color-segment accent" style="background: ${accentHex}"></div>
            </div>
            <div class="color-info">
              <div class="color-info-item">
                <div class="color-swatch" style="background: ${mainHex}"></div>
                <div>
                  <div class="label">主色</div>
                  <div class="hex">${mainHex}</div>
                  <div class="percent">60%</div>
                </div>
              </div>
              <div class="color-info-item">
                <div class="color-swatch" style="background: ${secondaryHex}"></div>
                <div>
                  <div class="label">辅色</div>
                  <div class="hex">${secondaryHex}</div>
                  <div class="percent">30%</div>
                </div>
              </div>
              <div class="color-info-item">
                <div class="color-swatch" style="background: ${accentHex}"></div>
                <div>
                  <div class="label">点缀色</div>
                  <div class="hex">${accentHex}</div>
                  <div class="percent">10%</div>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    // Copy scheme to clipboard
    function copyScheme(btn, main, secondary, accent) {
      const text = `主色: ${main} | 辅色: ${secondary} | 点缀色: ${accent}`;
      navigator.clipboard.writeText(text).then(() => {
        const originalHTML = btn.innerHTML;
        btn.classList.add('copied');
        btn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          已复制
        `;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = originalHTML;
        }, 2000);
      });
    }

    // Mode switching
    function initModeSelector() {
      const modeBtns = document.querySelectorAll('.mode-btn');
      modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const mode = btn.dataset.mode;
          if (mode === currentMode) return;

          currentMode = mode;
          modeBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          if (mode === 'auto') {
            stepPanel.classList.remove('active');
            schemesPanel.style.display = 'block';
            mainColorSection.style.display = 'block';
          } else {
            stepPanel.classList.add('active');
            schemesPanel.style.display = 'none';
            mainColorSection.style.display = 'none';
            resetStepSelections();
            renderSecondarySuggestions();
            updateStepPreview();
          }
        });
      });
    }

    function resetStepSelections() {
      selectedSecondary = null;
      selectedAccent = null;
      secondaryLightness = 50;
      accentLightness = 50;
      secondaryValue.textContent = '—';
      accentValue.textContent = '—';
      secondaryLightnessControl.style.display = 'none';
      accentLightnessControl.style.display = 'none';
      accentSection.classList.add('disabled');
      copyComboBtn.style.display = 'none';
      step1Dot.className = 'step-dot active';
      step2Dot.className = 'step-dot';
      step3Dot.className = 'step-dot';
    }

    // Secondary color suggestions
    function generateSecondarySuggestions(mainHue) {
      return [
        { h: -1, label: '黑色', type: 'black', lightness: 15 },
        { h: -1, label: '深灰', type: 'darkgray', lightness: 30 },
        { h: -1, label: '灰色', type: 'gray', lightness: 50 },
        { h: -1, label: '浅灰', type: 'lightgray', lightness: 70 },
        { h: -1, label: '白色', type: 'white', lightness: 90 },
        { h: (mainHue + 180) % 360, label: '互补色 +180°', type: 'complementary' },
        { h: (mainHue + 30) % 360, label: '类似色 +30°', type: 'analogous+30' },
        { h: (mainHue - 30 + 360) % 360, label: '类似色 -30°', type: 'analogous-30' },
        { h: (mainHue + 60) % 360, label: '双类似 +60°', type: 'double+60' },
        { h: (mainHue - 60 + 360) % 360, label: '双类似 -60°', type: 'double-60' },
        { h: (mainHue + 120) % 360, label: '三等分 +120°', type: 'triadic+120' },
        { h: (mainHue + 150) % 360, label: '拆分互补 +150°', type: 'split+150' },
        { h: (mainHue + 210) % 360, label: '拆分互补 +210°', type: 'split+210' }
      ];
    }

    function renderSecondarySuggestions() {
      const suggestions = generateSecondarySuggestions(currentHue);
      secondarySuggestions.innerHTML = suggestions.map(s => {
        const isNeutral = s.h === -1;
        const color = isNeutral ? `hsl(0, 0%, ${s.lightness}%)` : hslToHex(s.h, currentSaturation, 50);
        return `
          <div class="hue-suggestion"
               style="background: ${color};"
               data-hue="${s.h}"
               data-type="${s.type}"
               data-lightness="${s.lightness || 50}"
               title="${s.label}">
            <span class="hue-suggestion-label">${s.label}</span>
          </div>
        `;
      }).join('');

      secondarySuggestions.querySelectorAll('.hue-suggestion').forEach(el => {
        el.addEventListener('click', () => {
          const h = parseInt(el.dataset.hue);
          const type = el.dataset.type;
          const lightness = parseInt(el.dataset.lightness);
          selectSecondary(h, type, lightness);
        });
      });
    }

    function selectSecondary(hue, type, lightness) {
      const isNeutral = hue === -1;

      if (isNeutral) {
        selectedSecondary = {
          h: 0,
          s: 0,
          l: lightness
        };
        secondaryLightness = lightness;
        secondaryLightnessSlider.value = lightness;
        secondaryLightnessValue.textContent = `${lightness}%`;
        secondaryLightnessControl.style.display = 'flex';
      } else {
        selectedSecondary = {
          h: hue,
          s: Math.max(20, currentSaturation - 10),
          l: secondaryLightness
        };
        secondaryLightnessControl.style.display = 'flex';
      }

      secondarySuggestions.querySelectorAll('.hue-suggestion').forEach(el => {
        const elHue = parseInt(el.dataset.hue);
        const elLightness = parseInt(el.dataset.lightness);
        el.classList.toggle('selected', elHue === hue && elLightness === (lightness || 50));
      });

      const displayHex = isNeutral ? hslToHex(0, 0, lightness) : hslToHex(hue, currentSaturation, secondaryLightness);
      secondaryValue.textContent = displayHex;

      accentSection.classList.remove('disabled');
      step1Dot.className = 'step-dot completed';
      step2Dot.className = 'step-dot active';
      step3Dot.className = 'step-dot';

      renderAccentSuggestions();
      updateStepPreview();
    }

    // Accent color suggestions
    function generateAccentSuggestions(mainHue, mainSat, mainLit, secondaryHue, secondaryIsNeutral) {
      if (secondaryIsNeutral) {
        // When secondary is neutral, accent should complement the main color
        return [
          { h: mainHue, label: '同主色', type: 'same' },
          { h: (mainHue + 180) % 360, label: '主色互补', type: 'complement' },
          { h: (mainHue + 30) % 360, label: '主色+30°', type: 'analogous+30' },
          { h: (mainHue - 30 + 360) % 360, label: '主色-30°', type: 'analogous-30' }
        ];
      }
      return [
        { h: secondaryHue, label: '同辅色', type: 'same' },
        { h: (secondaryHue + 30) % 360, label: '辅色+30°', type: 'secondary+30' },
        { h: (secondaryHue - 30 + 360) % 360, label: '辅色-30°', type: 'secondary-30' },
        { h: (mainHue + secondaryHue) / 2 % 360, label: '中间色', type: 'midpoint' }
      ];
    }

    function renderAccentSuggestions() {
      if (!selectedSecondary) return;

      const secondaryIsNeutral = selectedSecondary.s === 0;
      const suggestions = generateAccentSuggestions(
        currentHue, currentSaturation, currentLightness,
        selectedSecondary.h, secondaryIsNeutral
      );

      accentSuggestions.innerHTML = suggestions.map(s => {
        const sat = secondaryIsNeutral ? Math.min(100, currentSaturation + 15) : (s.type === 'same' ? selectedSecondary.s : Math.min(100, currentSaturation + 15));
        const color = hslToHex(s.h, sat, accentLightness);
        return `
          <div class="hue-suggestion"
               style="background: ${color};"
               data-hue="${s.h}"
               data-type="${s.type}"
               title="${s.label}">
            <span class="hue-suggestion-label">${s.label}</span>
          </div>
        `;
      }).join('');

      accentSuggestions.querySelectorAll('.hue-suggestion').forEach(el => {
        el.addEventListener('click', () => {
          const h = parseInt(el.dataset.hue);
          selectAccent(h);
        });
      });
    }

    function selectAccent(hue) {
      const secondaryIsNeutral = selectedSecondary.s === 0;
      const sat = secondaryIsNeutral ? Math.min(100, currentSaturation + 15) : Math.min(100, currentSaturation + 15);
      selectedAccent = {
        h: hue,
        s: sat,
        l: accentLightness
      };

      accentSuggestions.querySelectorAll('.hue-suggestion').forEach(el => {
        el.classList.toggle('selected', parseInt(el.dataset.hue) === hue);
      });

      accentLightnessControl.style.display = 'flex';
      accentValue.textContent = hslToHex(hue, sat, accentLightness);

      step2Dot.className = 'step-dot completed';
      step3Dot.className = 'step-dot completed';
      copyComboBtn.style.display = 'flex';

      updateStepPreview();
    }

    function updateStepPreview() {
      const mainHex = hslToHex(currentHue, currentSaturation, currentLightness);
      const secondaryHex = selectedSecondary ? hslToHex(selectedSecondary.h, selectedSecondary.s, selectedSecondary.l) : '#e7e5e4';
      const accentHex = selectedAccent ? hslToHex(selectedAccent.h, selectedAccent.s, selectedAccent.l) : '#e7e5e4';

      previewMain.style.background = mainHex;
      previewSecondary.style.background = secondaryHex;
      previewAccent.style.background = accentHex;

      selectedMainSwatch.style.background = mainHex;
      selectedMainHex.textContent = mainHex;

      if (selectedSecondary) {
        selectedSecondarySwatch.style.background = hslToHex(selectedSecondary.h, selectedSecondary.s, selectedSecondary.l);
        selectedSecondaryHex.textContent = hslToHex(selectedSecondary.h, selectedSecondary.s, selectedSecondary.l);
      } else {
        selectedSecondarySwatch.style.background = '#e7e5e4';
        selectedSecondaryHex.textContent = '—';
      }

      if (selectedAccent) {
        selectedAccentSwatch.style.background = hslToHex(selectedAccent.h, selectedAccent.s, selectedAccent.l);
        selectedAccentHex.textContent = hslToHex(selectedAccent.h, selectedAccent.s, selectedAccent.l);
      } else {
        selectedAccentSwatch.style.background = '#e7e5e4';
        selectedAccentHex.textContent = '—';
      }
      
      if (currentMode === 'step') {
        updateAvatarColors(mainHex, secondaryHex, accentHex);
      }
    }

    // Copy combo
    function initCopyComboBtn() {
      copyComboBtn.addEventListener('click', () => {
        const mainHex = hslToHex(currentHue, currentSaturation, currentLightness);
        const secondaryHex = hslToHex(selectedSecondary.h, selectedSecondary.s, selectedSecondary.l);
        const accentHex = hslToHex(selectedAccent.h, selectedAccent.s, selectedAccent.l);

        const text = `主色: ${mainHex} | 辅色: ${secondaryHex} | 点缀色: ${accentHex}`;
        navigator.clipboard.writeText(text).then(() => {
          const originalHTML = copyComboBtn.innerHTML;
          copyComboBtn.classList.add('copied');
          copyComboBtn.innerHTML = `
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            已复制
          `;
          setTimeout(() => {
            copyComboBtn.classList.remove('copied');
            copyComboBtn.innerHTML = originalHTML;
          }, 2000);
        });
      });
    }

    // Secondary lightness slider
    secondaryLightnessSlider.addEventListener('input', (e) => {
      secondaryLightness = parseInt(e.target.value);
      secondaryLightnessValue.textContent = `${secondaryLightness}%`;
      if (selectedSecondary) {
        selectedSecondary.l = secondaryLightness;
        secondaryValue.textContent = hslToHex(selectedSecondary.h, selectedSecondary.s, secondaryLightness);
        updateStepPreview();
        renderAccentSuggestions();
      }
    });

    // Accent lightness slider
    accentLightnessSlider.addEventListener('input', (e) => {
      accentLightness = parseInt(e.target.value);
      accentLightnessValue.textContent = `${accentLightness}%`;
      if (selectedAccent) {
        selectedAccent.l = accentLightness;
        accentValue.textContent = hslToHex(selectedAccent.h, selectedAccent.s, accentLightness);
        updateStepPreview();
      }
    });

    // Event listeners
    colorWheel.addEventListener('click', handleWheelClick);

    saturationSlider.addEventListener('input', (e) => {
      currentSaturation = parseInt(e.target.value);
      updateFromHSL();
    });

    lightnessSlider.addEventListener('input', (e) => {
      currentLightness = parseInt(e.target.value);
      updateFromHSL();
    });

    hexInput.addEventListener('input', (e) => {
      let value = e.target.value.replace(/[^a-fA-F0-9]/g, '').slice(0, 6);
      e.target.value = value.toUpperCase();
      if (value.length === 6) {
        setColorFromHex('#' + value);
      }
    });

    hexInput.addEventListener('blur', (e) => {
      if (e.target.value.length < 6) {
        const hex = hslToHex(currentHue, currentSaturation, currentLightness);
        e.target.value = hex.slice(1);
      }
    });

    // Initialize
    drawColorWheel();
    initModeSelector();
    initCopyComboBtn();
    initBabylonScene();
    initAvatarControls();
    updateFromHSL();
  </script>
</body>
</html>
